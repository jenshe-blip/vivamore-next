services:
  vivamore:
    build:
      context: ./vivamore-next
      dockerfile: Dockerfile
    container_name: vivamore-next
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Uncomment and populate if you add env vars later:
    env_file:
      - ./vivamore-next/.env.local
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
